version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: driver_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-driver_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./
      dockerfile: backend/Dockerfile
    container_name: driver_tracker_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-driver_tracker}
      NODE_ENV: ${NODE_ENV:-production}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-driver-tracker-secret-key-change-in-production}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    container_name: driver_tracker_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      INTERNAL_API_URL: http://backend:3001/api
    depends_on:
      - backend
      - db

volumes:
  postgres_data:
