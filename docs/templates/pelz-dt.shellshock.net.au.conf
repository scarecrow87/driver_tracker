# pelz-dt.shellshock.net.au - Driver Tracker Frontend (Next.js standalone) nginx vhost
# Drop into: /etc/nginx/conf.d/pelz-dt.shellshock.net.au.conf
#
# Assumes:
# - Next.js standalone server listens on 127.0.0.1:3000 (systemd service)
# - Backend API is reachable over VPN/WireGuard at http://192.168.0.52:3001/api
# - TLS managed by Certbot (sudo certbot --nginx -d pelz-dt.shellshock.net.au)
# - Install this HTTP vhost first; Certbot will add the SSL listener/certificate lines.

server {
    listen 80;
    server_name pelz-dt.shellshock.net.au;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Cloudflare real IP (matches existing shellshockcomputer.com.au vhost).
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2c0f:f248::/32;
    set_real_ip_from 2a06:98c0::/29;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Runtime root for static aliases (matches systemd WorkingDirectory).
    set $driver_tracker_root /var/www/pelz-dt.shellshock.net.au/app;

    # Static assets: serve from disk for best caching.
    location /_next/static/ {
        alias $driver_tracker_root/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        alias $driver_tracker_root/public/icons/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /manifest.json {
        alias $driver_tracker_root/public/manifest.json;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/(sw\.js|workbox-[^/]+\.js|worker-[^/]+\.js)$ {
        alias $driver_tracker_root/public/$1;
        add_header Cache-Control "no-cache";
    }

    # Proxy API to backend over VPN/WireGuard.
    location /api/ {
        proxy_pass http://192.168.0.52:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
