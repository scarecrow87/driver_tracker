# Driver Tracker Frontend (Next.js standalone) - nginx vhost
# Drop into: /etc/nginx/conf.d/<driver-tracker-domain>.conf
#
# Assumes:
# - Next.js standalone server listens on 127.0.0.1:3000 (systemd service)
# - Backend API is reachable at https://<backend-host>/api
# - TLS managed by Certbot (certbot --nginx) OR you set ssl_certificate paths yourself

server {
    listen 80;
    server_name <driver-tracker-domain> www.<driver-tracker-domain>;

    # Let certbot manage redirects + ACME challenges; or uncomment:
    # return 301 https://$host$request_uri;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
}

server {
    listen 443 ssl http2;
    server_name <driver-tracker-domain> www.<driver-tracker-domain>;

    # If you use certbot --nginx, it will manage these lines.
    ssl_certificate /etc/letsencrypt/live/<driver-tracker-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<driver-tracker-domain>/privkey.pem;

    # If you are behind Cloudflare proxy, copy your existing "real IP" stanza here
    # (set_real_ip_from + real_ip_header) so $remote_addr is the true client IP.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Runtime root for static aliases (matches systemd WorkingDirectory).
    set $driver_tracker_root /var/www/<driver-tracker-domain>/app;

    # Static assets: serve from disk for best caching.
    location /_next/static/ {
        alias $driver_tracker_root/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /icons/ {
        alias $driver_tracker_root/public/icons/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /manifest.json {
        alias $driver_tracker_root/public/manifest.json;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/(sw\.js|workbox-[^/]+\.js|worker-[^/]+\.js)$ {
        alias $driver_tracker_root/public/$1;
        add_header Cache-Control "no-cache";
    }

    # Optional: proxy API directly to backend from nginx.
    # If you prefer app-level rewrites, you can remove this block and rely on INTERNAL_API_URL.
    location /api/ {
        proxy_pass https://<backend-host>/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

